<!DOCTYPE html>
<html>
	<head>
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1"
		>
		<title>Walikan Yogya</title>
		<link rel="icon" type="image/x-icon" href="images/favicon.ico">
		<style>
			body {
				background-color: #1a1210;
				color: #eedddb;
			}
			h1 {
				text-align: center;
			}
			textarea {
				width: 90%;
				background-color: #3c3231;
				color: #eedddb;
			}
			::placeholder {
				color: #eedddb;
				opacity: 1; /* Required for Firefox to show full color */
			}
			button {
				background-color: #c72b40;
				color: #1a1210;
				cursor: pointer;
				padding: 4px 10px;
			}
			.button2 {
			    background-color: #c0c0c0;
		</style>
	</head>
	<body>
		<h1>Sanḍi 'Walikan' Yogya<br>[Gus Joko©]</h1>
		<textarea id="inputText" rows="7" cols="50" placeholder="Halo, Gus Joko dari Trawas!"></textarea><br><br>
		<button onclick="encryptText()">ENCRYPT (jaḍikan sanḍi)</button>
		<button class="button2" onclick="copyOutput()" id="copyBtn">copy (salin sanḍi)</button><br><br>
		<div id="outputText"></div>
		<script>
			const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZḌÑṬṄabcdefghijklmnopqrstuvwxyzḍñṭṅ";
			const currentKey = "ASJMEFTPICÑṄDḌOHQYBGUVṬXRZNKWLasjmeftpicñṅdḍohqybguvṭxrznkwl"; 
			function encryptText() {
				let text = document.getElementById("inputText").value;
				let result = "";

				for (let char of text) {
					let index = alphabet.indexOf(char);
					result += index !== -1 ? currentKey[index] : char;
				}
				// Regex kustom ini lebih kebal bug untuk karakter spesial.
				result = result.replace(/(^|[^a-zA-ZḌÑṬṄḍñṭṅ])([aeiou])/g, '$1p$2')
				.replace(/(^|[^a-zA-ZḌÑṬṄḍñṭṅ])([AEIOU])/g, '$1P$2');

				document.getElementById("outputText").innerText = result;
			}

			function copyOutput() {
				let textToCopy = document.getElementById("outputText").innerText;

				navigator.clipboard.writeText(textToCopy).then(() => {
					let btn = document.getElementById("copyBtn");
					btn.innerText = "TERSALIN!";
					setTimeout(() => { btn.innerText = "copy (salin sanḍi)"; }, 2000);
				}).catch(err => {
					console.error('Gagal menyalin teks: ', err);
				});
			}
		</script>
	</body>
</html>
